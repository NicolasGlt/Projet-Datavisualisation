global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    env: "prod"
    region: "local"

# Règles d'alertes et recording rules
rule_files:
  - "/etc/prometheus/rules/recording_rules.yml"
  - "/etc/prometheus/rules/alert_rules.yml"

# Alertmanager
alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

# ── Scrape configs ─────────────────────────────────────────────────────────────
scrape_configs:

  # Prometheus lui-même
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Métriques système (CPU, RAM, FS, réseau)
  - job_name: "node_exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: "([^:]+):.*"
        replacement: "$1"

  # API de démo FastAPI
  - job_name: "demo-api"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["demo-api:8000"]
    relabel_configs:
      - target_label: service
        replacement: "demo-api"
      - target_label: env
        replacement: "prod"
