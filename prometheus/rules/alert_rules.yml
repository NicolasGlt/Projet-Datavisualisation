groups:

  # ── Alertes métier / symptômes ───────────────────────────────────────────────
  - name: demo_api_business
    rules:

      # [SYMPTÔME] Taux d'erreurs 5xx trop élevé (SLO breach)
      - alert: HighErrorRate
        expr: |
          job:http_errors_5xx:rate2m > 0.05
        for: 2m
        labels:
          service: demo-api
          severity: critical
          env: prod
        annotations:
          summary: "Taux d'erreurs 5xx élevé sur {{ $labels.job }}"
          description: |
            Le taux d'erreurs 5xx est de {{ $value | humanizePercentage }}
            (seuil SLO : 5%). Service : {{ $labels.job }}.
          runbook: "https://wiki.internal/runbooks/high-error-rate"
          dashboard: "http://localhost:3000/d/api-overview"
          action: |
            1. Vérifier les logs : aller dans Grafana > Explore > Loki, filtrer {service="demo-api"} level="error"
            2. Vérifier la cible Prometheus : Status > Targets
            3. Redémarrer le service si nécessaire : docker compose restart demo-api

      # [SYMPTÔME] Latence p95 trop haute
      - alert: HighP95Latency
        expr: |
          job_endpoint:http_request_duration_p95:rate5m > 1.0
        for: 3m
        labels:
          service: demo-api
          severity: warning
          env: prod
        annotations:
          summary: "Latence p95 dégradée sur {{ $labels.endpoint }}"
          description: |
            La latence p95 sur l'endpoint {{ $labels.endpoint }} est de
            {{ $value | humanizeDuration }} (seuil : 1s).
          runbook: "https://wiki.internal/runbooks/high-latency"
          dashboard: "http://localhost:3000/d/api-overview"
          action: |
            1. Identifier l'endpoint le plus lent (panel TopK Latency)
            2. Corréler avec les logs Loki pour identifier la cause
            3. Vérifier la saturation CPU/RAM (dashboard Infra)

      # [SYMPTÔME] Service indisponible (blackbox / up)
      - alert: ServiceDown
        expr: |
          up{job="demo-api"} == 0
        for: 1m
        labels:
          service: demo-api
          severity: critical
          env: prod
        annotations:
          summary: "Service {{ $labels.job }} DOWN"
          description: |
            Prometheus ne peut plus scraper le service {{ $labels.job }}
            (instance {{ $labels.instance }}).
          runbook: "https://wiki.internal/runbooks/service-down"
          dashboard: "http://localhost:3000/d/api-overview"
          action: |
            1. Vérifier : docker compose ps
            2. Consulter les logs : docker compose logs demo-api --tail=100
            3. Redémarrer : docker compose restart demo-api

  # ── Alertes saturation ────────────────────────────────────────────────────────
  - name: infrastructure_saturation
    rules:

      # [SATURATION] Mémoire disponible faible (< 15% pendant 5 min)
      - alert: LowMemoryAvailable
        expr: |
          (
            node_memory_MemAvailable_bytes
            / node_memory_MemTotal_bytes
          ) < 0.15
        for: 5m
        labels:
          severity: warning
          env: prod
        annotations:
          summary: "Mémoire disponible faible sur {{ $labels.instance }}"
          description: |
            Seulement {{ $value | humanizePercentage }} de mémoire disponible
            sur {{ $labels.instance }} (seuil : 15%).
          runbook: "https://wiki.internal/runbooks/low-memory"
          dashboard: "http://localhost:3000/d/infra-system"
          action: |
            1. Identifier les processus consommateurs : top / htop
            2. Vérifier les conteneurs : docker stats
            3. Envisager un restart ou un scale-up

      # [SATURATION] CPU élevé et soutenu (> 80% pendant 5 min)
      - alert: HighCPUUsage
        expr: |
          (
            1 - avg by (instance) (
              rate(node_cpu_seconds_total{mode="idle"}[2m])
            )
          ) > 0.80
        for: 5m
        labels:
          severity: warning
          env: prod
        annotations:
          summary: "CPU élevé sur {{ $labels.instance }}"
          description: |
            Utilisation CPU à {{ $value | humanizePercentage }} depuis plus de 5 min
            (seuil : 80%). Risque de dégradation de latence.
          runbook: "https://wiki.internal/runbooks/high-cpu"
          dashboard: "http://localhost:3000/d/infra-system"
          action: |
            1. Corréler avec les pics de trafic (dashboard API overview)
            2. Identifier le processus CPU-bound
            3. Envisager un throttling ou scale horizontal

  # ── Qualité de collecte ───────────────────────────────────────────────────────
  - name: monitoring_quality
    rules:

      # [QUALITÉ] Target Prometheus en échec de scrape
      - alert: PrometheusTargetDown
        expr: |
          up == 0
        for: 2m
        labels:
          severity: warning
          env: prod
        annotations:
          summary: "Target Prometheus DOWN : {{ $labels.job }} / {{ $labels.instance }}"
          description: |
            La target {{ $labels.instance }} du job {{ $labels.job }} est
            inaccessible depuis 2 min. Les métriques ne sont plus collectées.
          runbook: "https://wiki.internal/runbooks/target-down"
          dashboard: "http://localhost:3000/d/api-overview"
          action: |
            1. Vérifier Status > Targets dans Prometheus UI
            2. Tester manuellement : curl http://<instance>/metrics
            3. Vérifier la connectivité réseau (docker network)

      # [QUALITÉ] Taux de scrape en erreur (scrape_samples_scraped == 0)
      - alert: ScrapeSamplesZero
        expr: |
          scrape_samples_scraped{job!="prometheus"} == 0
        for: 5m
        labels:
          severity: warning
          env: prod
        annotations:
          summary: "Aucune métrique collectée pour {{ $labels.job }}"
          description: |
            Le scrape de {{ $labels.job }} renvoie 0 samples depuis 5 min.
            L'endpoint /metrics est peut-être vide ou cassé.
          action: |
            1. Vérifier l'endpoint /metrics manuellement
            2. Vérifier la configuration prometheus.yml
